services:
  postgres:
    image: postgres:16
    container_name: warehouse-postgres
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse -h 127.0.0.1 -p 5432"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: warehouse-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: warehouse-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/code
    restart: unless-stopped

  worker:
    build: .
    container_name: warehouse-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_app.celery:celery_app worker -l INFO
    volumes:
      - .:/code
    restart: unless-stopped

volumes:
  pgdata: